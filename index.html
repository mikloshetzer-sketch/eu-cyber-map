<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EU Kiberbiztonsági Térkép</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    :root{
      --bg: #070a12;
      --panel: rgba(12, 18, 34, .82);
      --border: rgba(110, 231, 255, .18);
      --text: rgba(235, 245, 255, .92);
      --muted: rgba(235, 245, 255, .65);
      --neon: rgba(110, 231, 255, .9);
      --neon2: rgba(167, 139, 250, .9);
      --warn: rgba(251, 191, 36, .95);
    }

    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #map { height: 100vh; }

    .panel {
      position: absolute;
      z-index: 999;
      top: 14px;
      left: 14px;
      width: min(380px, calc(100vw - 28px));
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 12px 10px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    .title {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom: 8px;
    }
    .title h1 {
      margin: 0;
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text);
    }
    .badge{
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .row { display:flex; gap:10px; align-items:center; margin: 10px 0; }
    .row label { font-size: 12px; color: var(--muted); min-width: 86px; }
    select, input[type="date"]{
      width: 100%;
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
    }
    .checks{ display:flex; flex-wrap: wrap; gap:10px; margin-top: 6px; }
    .checks label{ min-width: unset; color: var(--text); font-size: 12px; display:flex; gap:8px; align-items:center; }
    input[type="checkbox"]{ accent-color: rgba(110,231,255,.95); }

    .btns{ display:flex; gap:10px; margin-top: 10px; }
    button{
      width: 100%;
      cursor: pointer;
      background: rgba(110,231,255,.10);
      color: var(--text);
      border: 1px solid rgba(110,231,255,.25);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 600;
      letter-spacing: .02em;
    }
    button:hover{ background: rgba(110,231,255,.16); }

    .hint{
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .neon-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(110, 231, 255, .95);
      box-shadow:
        0 0 0 4px rgba(110, 231, 255, .15),
        0 0 18px rgba(110, 231, 255, .65),
        0 0 34px rgba(167, 139, 250, .22);
      border: 1px solid rgba(255,255,255,.35);
    }

    .leaflet-popup-content-wrapper{
      background: rgba(10, 14, 28, .92);
      color: var(--text);
      border: 1px solid rgba(110,231,255,.18);
      border-radius: 14px;
      box-shadow: 0 18px 60px rgba(0,0,0,.5);
    }
    .leaflet-popup-tip{ background: rgba(10, 14, 28, .92); }
    .pop-title{ font-weight: 800; letter-spacing: .02em; margin-bottom: 4px; }
    .pop-meta{ color: var(--muted); font-size: 12px; }
    .pop-tag{
      display:inline-block; margin-top: 8px;
      border: 1px solid rgba(167,139,250,.28);
      background: rgba(167,139,250,.10);
      padding: 3px 8px; border-radius: 999px;
      font-size: 12px;
    }
    .pop-warn{
      display:inline-block; margin-top: 8px; margin-left: 8px;
      border: 1px solid rgba(251,191,36,.35);
      background: rgba(251,191,36,.12);
      color: rgba(255,240,210,.95);
      padding: 3px 8px; border-radius: 999px;
      font-size: 12px;
    }

    /* Legend control */
    .legend {
      background: rgba(12, 18, 34, .82);
      border: 1px solid rgba(110, 231, 255, .18);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      min-width: 170px;
    }
    .legend .head{
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .legend .item{
      display:flex;
      align-items:center;
      gap:10px;
      font-size: 12px;
      color: var(--text);
      margin: 6px 0;
    }
    .legend .swatch{
      width: 18px; height: 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,.14);
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <div class="title">
      <h1>EU Cyber Map</h1>
      <div class="badge" id="countBadge">— incidens</div>
    </div>

    <div class="checks">
      <label><input type="checkbox" id="toggleIncidents" checked> Incidensek</label>
      <label><input type="checkbox" id="toggleIndex"> Országos index</label>
      <label><input type="checkbox" id="toggleBorders"> Országhatárok</label>
    </div>

    <div class="row">
      <label for="typeFilter">Típus</label>
      <select id="typeFilter">
        <option value="ALL">Összes</option>
        <option value="DDoS">DDoS</option>
        <option value="Ransomware">Ransomware</option>
        <option value="Phishing">Phishing</option>
        <option value="DataLeak">Adatszivárgás</option>
        <option value="SupplyChain">Ellátási lánc</option>
      </select>
    </div>

    <div class="row">
      <label for="fromDate">Mettől</label>
      <input type="date" id="fromDate">
    </div>
    <div class="row">
      <label for="toDate">Meddig</label>
      <input type="date" id="toDate">
    </div>

    <div class="btns">
      <button id="applyBtn">Szűrés</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="hint">
      Újdonság: ha az incidensben nincs <code>lat/lon</code>, de van <code>country</code>, automatikusan ország-középpontra kerül. + külön kapcsolható országhatárok és index legenda.
    </div>
  </div>

  <script>
    // ---- 1) Térkép (sötét "cyber" csempék) ----
    const map = L.map("map", { zoomControl: true }).setView([54.5, 15.0], 4);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // ---- 2) Közös ország-GeoJSON + centroid map (egyszer töltjük le, és minden réteg ezt használja) ----
    const COUNTRIES_GEOJSON_URL = "https://raw.githubusercontent.com/Leaflet/Leaflet.VectorGrid/master/docs/eu-countries.geo.json";

    let countriesGeo = null;          // a teljes GeoJSON
    let countryCentroids = null;      // { "HU": {lat, lon}, ... }

    async function ensureCountriesData(){
      if (countriesGeo && countryCentroids) return { countriesGeo, countryCentroids };

      const resp = await fetch(COUNTRIES_GEOJSON_URL, { cache: "force-cache" });
      if (!resp.ok) throw new Error("Nem sikerült betölteni az ország GeoJSON-t.");
      countriesGeo = await resp.json();

      // Centroid: egyszerűen a polygon bounds közepe (gyors, elég jó fallbackhez)
      countryCentroids = {};
      const temp = L.geoJSON(countriesGeo, {
        onEachFeature: (feature, layer) => {
          const iso2 = feature?.properties?.iso_a2;
          if (!iso2) return;
          const c = layer.getBounds().getCenter();
          countryCentroids[iso2] = { lat: c.lat, lon: c.lng };
        }
      });

      // temp layer-t nem adjuk a map-hez, csak számolásra kellett
      return { countriesGeo, countryCentroids };
    }

    // ---- 3) Incidensek betöltése fájlból ----
    let INCIDENTS = [];

    async function loadIncidents(){
      const resp = await fetch("./data/incidents.json", { cache: "no-store" });
      if (!resp.ok) throw new Error("Nem sikerült betölteni: data/incidents.json");
      const data = await resp.json();
      INCIDENTS = Array.isArray(data) ? data : [];
    }

    // ---- 4) Incidensek réteg (LayerGroup) + neon ikon ----
    const incidentsLayer = L.layerGroup();
    const neonIcon = L.divIcon({
      className: "",
      html: '<div class="neon-dot"></div>',
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });

    function inDateRange(d, from, to){
      if (!from && !to) return true;
      const t = new Date(d).getTime();
      if (from){
        const f = new Date(from).getTime();
        if (t < f) return false;
      }
      if (to){
        const tt = new Date(to).getTime();
        if (t > tt) return false;
      }
      return true;
    }

    function resolveIncidentLatLon(incident){
      // 1) Ha van pontos lat/lon: azt használjuk
      if (Number.isFinite(incident.lat) && Number.isFinite(incident.lon)) {
        return { lat: incident.lat, lon: incident.lon, usedFallback: false };
      }
      // 2) Ha nincs, de van country: centroid fallback
      const iso2 = incident.country;
      if (iso2 && countryCentroids && countryCentroids[iso2]) {
        const c = countryCentroids[iso2];
        return { lat: c.lat, lon: c.lon, usedFallback: true };
      }
      // 3) Semmi
      return null;
    }

    async function renderIncidents(){
      incidentsLayer.clearLayers();

      // centroid fallbackhez kellhet a countryCentroids
      await ensureCountriesData();

      const typeValue = document.getElementById("typeFilter").value;
      const fromDate = document.getElementById("fromDate").value;
      const toDate = document.getElementById("toDate").value;

      const filtered = INCIDENTS.filter(x => {
        const typeOk = (typeValue === "ALL") ? true : (x.type === typeValue);
        const dateOk = inDateRange(x.date, fromDate, toDate);
        return typeOk && dateOk;
      });

      let renderedCount = 0;

      filtered.forEach(x => {
        const pos = resolveIncidentLatLon(x);
        if (!pos) return;

        const marker = L.marker([pos.lat, pos.lon], { icon: neonIcon });

        const warn = pos.usedFallback ? `<span class="pop-warn">ország-közép (fallback)</span>` : "";
        marker.bindPopup(`
          <div class="pop-title">${x.title ?? "Incidens"}</div>
          <div class="pop-meta">Dátum: <strong>${x.date ?? "n/a"}</strong> · Ország: <strong>${x.country ?? "n/a"}</strong></div>
          <div>
            <span class="pop-tag">${x.type ?? "n/a"}</span>
            ${warn}
          </div>
        `);

        incidentsLayer.addLayer(marker);
        renderedCount += 1;
      });

      document.getElementById("countBadge").textContent = `${renderedCount} incidens`;
    }

    // ---- 5) Országos index réteg (GeoJSON) – ki/be kapcsolható ----
    // Demo index: 0..100 (később cseréljük valódi adatra)
    const COUNTRY_INDEX = {
      "DE": 78, "FR": 74, "NL": 80, "EE": 82, "HU": 62, "IT": 68, "ES": 70, "PL": 64, "SE": 79
    };

    function indexColor(v){
      if (v == null) return "rgba(255,255,255,.05)";
      if (v >= 80) return "rgba(110,231,255,.35)";
      if (v >= 70) return "rgba(167,139,250,.28)";
      if (v >= 60) return "rgba(110,231,255,.18)";
      return "rgba(255,255,255,.10)";
    }

    let indexLayer = null;

    async function ensureIndexLayer(){
      if (indexLayer) return indexLayer;

      const { countriesGeo } = await ensureCountriesData();

      indexLayer = L.geoJSON(countriesGeo, {
        style: (feature) => {
          const iso2 = feature?.properties?.iso_a2;
          const v = COUNTRY_INDEX[iso2];
          return {
            color: "rgba(110,231,255,.18)",
            weight: 1,
            fillColor: indexColor(v),
            fillOpacity: 1
          };
        },
        onEachFeature: (feature, layer) => {
          const iso2 = feature?.properties?.iso_a2;
          const name = feature?.properties?.name || "Ismeretlen";
          const v = COUNTRY_INDEX[iso2];
          layer.bindTooltip(`${name} (${iso2}) — index: ${v ?? "n/a"}`, { sticky: true, opacity: 0.95 });
        }
      });

      return indexLayer;
    }

    // ---- 6) Országhatárok overlay (külön kapcsolható) ----
    let bordersLayer = null;

    async function ensureBordersLayer(){
      if (bordersLayer) return bordersLayer;

      const { countriesGeo } = await ensureCountriesData();

      bordersLayer = L.geoJSON(countriesGeo, {
        style: () => ({
          color: "rgba(110,231,255,.28)",
          weight: 2,
          opacity: 1,
          fillOpacity: 0
        }),
        interactive: false
      });

      return bordersLayer;
    }

    // ---- 7) Index legend (csak ha index ON) ----
    const legend = L.control({ position: "bottomright" });
    legend.onAdd = function(){
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = `
        <div class="head">Országos index</div>
        <div class="item"><span class="swatch" style="background:${indexColor(80)}"></span> 80–100</div>
        <div class="item"><span class="swatch" style="background:${indexColor(70)}"></span> 70–79</div>
        <div class="item"><span class="swatch" style="background:${indexColor(60)}"></span> 60–69</div>
        <div class="item"><span class="swatch" style="background:${indexColor(10)}"></span> 0–59</div>
        <div class="item"><span class="swatch" style="background:${indexColor(null)}"></span> n/a</div>
      `;
      // Ne lehessen a legendet “átkattintani” a térképre
      L.DomEvent.disableClickPropagation(div);
      return div;
    };

    function showLegend(){
      try { legend.addTo(map); } catch (e) {}
    }
    function hideLegend(){
      try { map.removeControl(legend); } catch (e) {}
    }

    // ---- 8) UI események ----
    document.getElementById("applyBtn").addEventListener("click", async () => {
      await renderIncidents();
    });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      document.getElementById("typeFilter").value = "ALL";
      document.getElementById("fromDate").value = "";
      document.getElementById("toDate").value = "";
      await renderIncidents();
    });

    document.getElementById("toggleIncidents").addEventListener("change", async (e) => {
      if (e.target.checked) {
        incidentsLayer.addTo(map);
        await renderIncidents();
      } else {
        map.removeLayer(incidentsLayer);
      }
    });

    document.getElementById("toggleIndex").addEventListener("change", async (e) => {
      const layer = await ensureIndexLayer();
      if (e.target.checked) {
        layer.addTo(map);
        showLegend();
      } else {
        map.removeLayer(layer);
        hideLegend();
      }
    });

    document.getElementById("toggleBorders").addEventListener("change", async (e) => {
      const layer = await ensureBordersLayer();
      if (e.target.checked) layer.addTo(map);
      else map.removeLayer(layer);
    });

    // ---- 9) Indulás ----
    incidentsLayer.addTo(map);

    (async () => {
      try {
        // ország-adatok előtöltése: gyorsabb UI + centroid fallback biztosan megvan
        await ensureCountriesData();
        await loadIncidents();
        await renderIncidents();
      } catch (err) {
        console.error(err);
        document.getElementById("countBadge").textContent = "Hiba: adatok nem töltődtek be";
      }
    })();
  </script>
</body>
</html>
