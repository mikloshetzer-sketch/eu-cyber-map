<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EU Kiberbiztonsági Térkép</title>

  <!-- Leaflet (térkép könyvtár) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    header { padding: 12px 16px; border-bottom: 1px solid #eee; }
    #map { height: calc(100vh - 58px); }
    .hint { color: #666; font-size: 14px; margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <div><strong>EU Kiberbiztonsági Térkép</strong></div>
    <div class="hint">1. lépés: alap EU-térkép GitHub Pages-en. Következőben jönnek az adatrétegek és szűrők.</div>
  </header>

  <div id="map"></div>

  <script>
    // EU középpont környéke
    const map = L.map("map").setView([54.5, 15.0], 4);

    // Ingyenes, stabil térképcsempék (OpenStreetMap)
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap közreműködők'
    }).addTo(map);

    // Teszt jelölő (Budapest)
    L.marker([47.4979, 19.0402]).addTo(map)
      .bindPopup("Teszt pont: Budapest")
      .openPopup();
  </script>
</body>
</html>
