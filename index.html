<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EU Kiberbiztonsági Térkép</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- MarkerCluster -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
    crossorigin=""
  ></script>

  <!-- Heatmap -->
  <script
    src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"
    crossorigin=""
  ></script>

  <style>
    :root{
      --bg: #070a12;
      --panel: rgba(12, 18, 34, .82);
      --border: rgba(110, 231, 255, .18);
      --text: rgba(235, 245, 255, .92);
      --muted: rgba(235, 245, 255, .65);
      --warn: rgba(251, 191, 36, .95);
      --ok: rgba(52, 211, 153, .95);
      --bad: rgba(248, 113, 113, .95);

      --danger: rgba(248, 113, 113, .95);
      --green: rgba(52, 211, 153, .95);
      --blue: rgba(96, 165, 250, .95);
      --purple: rgba(167, 139, 250, .95);
      --cyan: rgba(34, 211, 238, .95);
    }

    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #map { height: 100vh; }

    .panel {
      position: absolute;
      z-index: 999;
      top: 14px;
      left: 14px;
      width: min(480px, calc(100vw - 28px));
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 12px 10px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }

    .title {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom: 8px;
    }
    .title h1 {
      margin: 0;
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text);
    }
    .badge{
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .checks{ display:flex; flex-wrap: wrap; gap:10px; margin-top: 6px; margin-bottom: 6px; }
    .checks label{ color: var(--text); font-size: 12px; display:flex; gap:8px; align-items:center; }
    input[type="checkbox"]{ accent-color: rgba(110,231,255,.95); }

    .row { display:flex; gap:10px; align-items:center; margin: 10px 0; }
    .row label { font-size: 12px; color: var(--muted); min-width: 86px; }

    select, input[type="text"]{
      width: 100%;
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
    }

    .sliderBox{
      margin-top: 8px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
    }
    .sliderHead{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .sliderHead strong{ color: var(--text); font-weight: 700; }
    .sliders{ display:grid; grid-template-columns: 1fr; gap: 10px; }

    .btns{ display:flex; gap:10px; margin-top: 10px; }
    button{
      width: 100%;
      cursor: pointer;
      background: rgba(110,231,255,.10);
      color: var(--text);
      border: 1px solid rgba(110,231,255,.25);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 600;
      letter-spacing: .02em;
    }
    button:hover{ background: rgba(110,231,255,.16); }

    .hint{
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }
    .src{
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid rgba(255,255,255,.10);
      padding-top: 8px;
      line-height: 1.35;
    }
    .src strong{ color: var(--text); }

    /* Type markers */
    .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.35);
    }
    .dot-ddos { background: rgba(34, 211, 238, .95); box-shadow: 0 0 0 4px rgba(34,211,238,.15), 0 0 18px rgba(34,211,238,.60), 0 0 34px rgba(167,139,250,.18); }
    .dot-ransomware { background: rgba(248, 113, 113, .95); box-shadow: 0 0 0 4px rgba(248,113,113,.15), 0 0 18px rgba(248,113,113,.55), 0 0 34px rgba(167,139,250,.18); }
    .dot-phishing { background: rgba(167, 139, 250, .95); box-shadow: 0 0 0 4px rgba(167,139,250,.15), 0 0 18px rgba(167,139,250,.55), 0 0 34px rgba(34,211,238,.18); }
    .dot-dataleak { background: rgba(96, 165, 250, .95); box-shadow: 0 0 0 4px rgba(96,165,250,.15), 0 0 18px rgba(96,165,250,.55), 0 0 34px rgba(167,139,250,.18); }
    .dot-supplychain { background: rgba(52, 211, 153, .95); box-shadow: 0 0 0 4px rgba(52,211,153,.15), 0 0 18px rgba(52,211,153,.55), 0 0 34px rgba(34,211,238,.18); }
    .dot-other { background: rgba(110, 231, 255, .95); box-shadow: 0 0 0 4px rgba(110,231,255,.15), 0 0 18px rgba(110,231,255,.60), 0 0 34px rgba(167,139,250,.18); }

    /* Popup vibe */
    .leaflet-popup-content-wrapper{
      background: rgba(10, 14, 28, .92);
      color: var(--text);
      border: 1px solid rgba(110,231,255,.18);
      border-radius: 14px;
      box-shadow: 0 18px 60px rgba(0,0,0,.5);
    }
    .leaflet-popup-tip{ background: rgba(10, 14, 28, .92); }
    .pop-title{ font-weight: 800; letter-spacing: .02em; margin-bottom: 4px; }
    .pop-meta{ color: var(--muted); font-size: 12px; line-height: 1.35; }
    .pop-tag{
      display:inline-block; margin-top: 8px;
      border: 1px solid rgba(167,139,250,.28);
      background: rgba(167,139,250,.10);
      padding: 3px 8px; border-radius: 999px;
      font-size: 12px;
    }
    .pop-warn{
      display:inline-block; margin-top: 8px; margin-left: 8px;
      border: 1px solid rgba(251,191,36,.35);
      background: rgba(251,191,36,.12);
      color: rgba(255,240,210,.95);
      padding: 3px 8px; border-radius: 999px;
      font-size: 12px;
    }
    .conf {
      display:inline-block;
      margin-left: 8px;
      margin-top: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color: var(--text);
    }
    .conf-high { border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.10); }
    .conf-med  { border-color: rgba(251,191,36,.35); background: rgba(251,191,36,.10); }
    .conf-low  { border-color: rgba(248,113,113,.35); background: rgba(248,113,113,.10); }

    a.pop-link { color: rgba(110,231,255,.95); text-decoration: none; }
    a.pop-link:hover { text-decoration: underline; }

    /* Legend (NCSI choropleth) */
    .legend {
      background: rgba(12, 18, 34, .82);
      border: 1px solid rgba(110, 231, 255, .18);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      min-width: 170px;
    }
    .legend .head{
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .legend .item{
      display:flex;
      align-items:center;
      gap:10px;
      font-size: 12px;
      color: var(--text);
      margin: 6px 0;
    }
    .legend .swatch{
      width: 18px; height: 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,.14);
    }

    /* Make default cluster look more "cyber" */
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background: rgba(110,231,255,.18) !important;
      border: 1px solid rgba(110,231,255,.25);
      box-shadow: 0 0 18px rgba(110,231,255,.22);
    }
    .marker-cluster div {
      background: rgba(12,18,34,.82) !important;
      color: var(--text) !important;
      border-radius: 999px !important;
      border: 1px solid rgba(110,231,255,.18);
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <div class="title">
      <h1>EU Cyber Map</h1>
      <div class="badge" id="countBadge">— incidens</div>
    </div>

    <div class="checks">
      <label><input type="checkbox" id="toggleIncidents" checked> Pontok</label>
      <label><input type="checkbox" id="toggleClusters" checked> Cluster</label>
      <label><input type="checkbox" id="toggleHeatmap"> Heatmap</label>
      <label><input type="checkbox" id="toggleIndex" checked> Index</label>
      <label><input type="checkbox" id="toggleBorders"> Határok</label>
    </div>

    <div class="row">
      <label for="indexSelect">Index</label>
      <select id="indexSelect"></select>
    </div>

    <div class="row">
      <label for="searchFilter">Keresés</label>
      <input type="text" id="searchFilter" placeholder="pl. bank, eGov, egészségügy..." />
    </div>

    <div class="row">
      <label for="typeFilter">Típus</label>
      <select id="typeFilter">
        <option value="ALL">Összes</option>
        <option value="DDoS">DDoS</option>
        <option value="Ransomware">Ransomware</option>
        <option value="Phishing">Phishing</option>
        <option value="DataLeak">Adatszivárgás</option>
        <option value="SupplyChain">Ellátási lánc</option>
      </select>
    </div>

    <div class="sliderBox">
      <div class="sliderHead">
        <div>Idősáv: <strong id="fromLabel">—</strong></div>
        <div>→ <strong id="toLabel">—</strong></div>
      </div>
      <div class="sliders">
        <input type="range" id="fromRange" min="0" max="0" value="0" />
        <input type="range" id="toRange" min="0" max="0" value="0" />
      </div>
    </div>

    <div class="btns">
      <button id="applyBtn">Szűrés</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="hint">
      Új: <strong>cluster + heatmap</strong>, és popupban <strong>forráslink + confidence</strong>. Országra kattintva továbbra is: index + incidens-szám.
    </div>

    <div class="src" id="indexSourceLine">Index forrás: betöltés…</div>
  </div>

  <script>
    // ---------------------------
    // 1) Map
    // ---------------------------
    const map = L.map("map", { zoomControl: true }).setView([54.5, 15.0], 4);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // ---------------------------
    // 2) Countries GeoJSON + centroid map
    // ---------------------------
    const COUNTRIES_GEOJSON_URL = "https://raw.githubusercontent.com/Leaflet/Leaflet.VectorGrid/master/docs/eu-countries.geo.json";

    let countriesGeo = null;
    let countryCentroids = null;

    async function ensureCountriesData(){
      if (countriesGeo && countryCentroids) return { countriesGeo, countryCentroids };

      const resp = await fetch(COUNTRIES_GEOJSON_URL, { cache: "force-cache" });
      if (!resp.ok) throw new Error("Nem sikerült betölteni az ország GeoJSON-t.");
      countriesGeo = await resp.json();

      countryCentroids = {};
      L.geoJSON(countriesGeo, {
        onEachFeature: (feature, layer) => {
          const iso2 = feature?.properties?.iso_a2;
          if (!iso2) return;
          const c = layer.getBounds().getCenter();
          countryCentroids[iso2] = { lat: c.lat, lon: c.lng };
        }
      });

      return { countriesGeo, countryCentroids };
    }

    // ---------------------------
    // 3) Load incidents + indices
    // ---------------------------
    let INCIDENTS = [];
    async function loadIncidents(){
      const resp = await fetch("./data/incidents.json", { cache: "no-store" });
      if (!resp.ok) throw new Error("Nem sikerült betölteni: data/incidents.json");
      const data = await resp.json();
      INCIDENTS = Array.isArray(data) ? data : [];
    }

    let INDICES = null;
    let selectedIndexKey = "NCSI";

    async function loadIndices(){
      const resp = await fetch("./data/indices.json", { cache: "no-store" });
      if (!resp.ok) throw new Error("Nem sikerült betölteni: data/indices.json");
      INDICES = await resp.json();
      selectedIndexKey = INDICES?.selected_default ?? "NCSI";
      populateIndexSelect();
      updateIndexSourceLine();
    }

    function populateIndexSelect(){
      const sel = document.getElementById("indexSelect");
      sel.innerHTML = "";
      const sources = INDICES?.sources ?? {};
      for (const k of Object.keys(sources)){
        const opt = document.createElement("option");
        opt.value = k;
        opt.textContent = sources[k]?.label ?? k;
        sel.appendChild(opt);
      }
      sel.value = selectedIndexKey;
    }

    function currentIndexObj(){
      const sources = INDICES?.sources ?? {};
      return sources[selectedIndexKey] ?? null;
    }

    function updateIndexSourceLine(){
      const idx = currentIndexObj();
      if (!idx){
        document.getElementById("indexSourceLine").textContent = "Index forrás: n/a";
        return;
      }
      const note = idx.source_note ? ` — ${idx.source_note}` : "";
      document.getElementById("indexSourceLine").innerHTML =
        `Index forrás: <strong>${idx.source_name ?? "n/a"}</strong>${note}`;
    }

    // ---------------------------
    // 4) Time slider axis
    // ---------------------------
    let ALL_DATES = [];

    function toDateKey(s){ return String(s || "").slice(0, 10); }

    function buildDateAxis(){
      const set = new Set();
      for (const x of INCIDENTS){
        const d = toDateKey(x.date);
        if (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) set.add(d);
      }
      ALL_DATES = Array.from(set).sort();
      if (ALL_DATES.length === 0) ALL_DATES = ["2026-01-01"];

      const fromRange = document.getElementById("fromRange");
      const toRange = document.getElementById("toRange");

      fromRange.min = 0;
      toRange.min = 0;
      fromRange.max = ALL_DATES.length - 1;
      toRange.max = ALL_DATES.length - 1;

      fromRange.value = 0;
      toRange.value = ALL_DATES.length - 1;

      syncDateLabels();
    }

    function clampRanges(){
      const fromRange = document.getElementById("fromRange");
      const toRange = document.getElementById("toRange");
      let a = Number(fromRange.value);
      let b = Number(toRange.value);
      if (a > b) { toRange.value = a; b = a; }
      return { fromIdx: a, toIdx: b };
    }

    function getSelectedDateRange(){
      const { fromIdx, toIdx } = clampRanges();
      return { from: ALL_DATES[fromIdx], to: ALL_DATES[toIdx] };
    }

    function syncDateLabels(){
      const { from, to } = getSelectedDateRange();
      document.getElementById("fromLabel").textContent = from;
      document.getElementById("toLabel").textContent = to;
    }

    // ---------------------------
    // 5) Incidents: markers + clusters + heatmap
    // ---------------------------
    const rawMarkersLayer = L.layerGroup();             // sima pontok
    const clusterLayer = L.markerClusterGroup({         // cluster
      showCoverageOnHover: false,
      spiderfyDistanceMultiplier: 1.1,
      maxClusterRadius: 48
    });

    let heatLayer = null;                               // heatmap layer
    let LAST_FILTERED_INCIDENTS = [];                   // ország-kattintáshoz

    function norm(s){ return String(s || "").toLowerCase().trim(); }
    function inDateRangeKey(d, from, to){ return d && d >= from && d <= to; }

    function typeToDotClass(t){
      switch (t){
        case "DDoS": return "dot dot-ddos";
        case "Ransomware": return "dot dot-ransomware";
        case "Phishing": return "dot dot-phishing";
        case "DataLeak": return "dot dot-dataleak";
        case "SupplyChain": return "dot dot-supplychain";
        default: return "dot dot-other";
      }
    }

    function iconForType(t){
      return L.divIcon({
        className: "",
        html: `<div class="${typeToDotClass(t)}"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });
    }

    function resolveIncidentLatLon(incident){
      if (Number.isFinite(incident.lat) && Number.isFinite(incident.lon)) {
        return { lat: incident.lat, lon: incident.lon, usedFallback: false };
      }
      const iso2 = incident.country;
      if (iso2 && countryCentroids && countryCentroids[iso2]) {
        const c = countryCentroids[iso2];
        return { lat: c.lat, lon: c.lon, usedFallback: true };
      }
      return null;
    }

    function confidenceClass(conf){
      const c = String(conf || "").toLowerCase();
      if (c === "high") return "conf conf-high";
      if (c === "med" || c === "medium") return "conf conf-med";
      if (c === "low") return "conf conf-low";
      return "conf";
    }

    function confidenceLabel(conf){
      const c = String(conf || "").toLowerCase();
      if (c === "high") return "High";
      if (c === "med" || c === "medium") return "Med";
      if (c === "low") return "Low";
      return "n/a";
    }

    function heatWeight(incident){
      // egyszerű súlyozás: confidence + type
      // (később lehet impact alapú)
      const conf = String(incident.confidence || "").toLowerCase();
      let w = 0.45;
      if (conf === "high") w += 0.35;
      else if (conf === "med" || conf === "medium") w += 0.20;
      else if (conf === "low") w += 0.10;

      switch (incident.type){
        case "Ransomware": w += 0.20; break;
        case "DataLeak": w += 0.15; break;
        case "SupplyChain": w += 0.18; break;
        default: w += 0.10; break;
      }

      // clamp 0.2..1.0
      return Math.max(0.2, Math.min(1.0, w));
    }

    function buildIncidentPopupHtml(x, usedFallback){
      const warn = usedFallback ? `<span class="pop-warn">ország-közép</span>` : "";
      const confCls = confidenceClass(x.confidence);
      const confLbl = confidenceLabel(x.confidence);

      const srcLine = (x.source_url && x.source_name)
        ? `<div class="pop-meta" style="margin-top:8px;">
             Forrás: <a class="pop-link" href="${x.source_url}" target="_blank" rel="noopener noreferrer">${x.source_name}</a>
           </div>`
        : (x.source_url
            ? `<div class="pop-meta" style="margin-top:8px;">
                 Forrás: <a class="pop-link" href="${x.source_url}" target="_blank" rel="noopener noreferrer">${x.source_url}</a>
               </div>`
            : `<div class="pop-meta" style="margin-top:8px;">Forrás: n/a</div>`);

      return `
        <div class="pop-title">${x.title ?? "Incidens"}</div>
        <div class="pop-meta">Dátum: <strong>${toDateKey(x.date) || "n/a"}</strong> · Ország: <strong>${x.country ?? "n/a"}</strong></div>
        <div>
          <span class="pop-tag">${x.type ?? "n/a"}</span>
          ${warn}
          <span class="${confCls}">conf: ${confLbl}</span>
        </div>
        ${srcLine}
      `;
    }

    function setIncidentLayersVisibility(){
      const showPoints = document.getElementById("toggleIncidents").checked;
      const useClusters = document.getElementById("toggleClusters").checked;
      const showHeat = document.getElementById("toggleHeatmap").checked;

      // Points/clusters are mutually exclusive in display, but both can be ON/OFF
      // If showPoints is off -> remove both marker layers.
      if (!showPoints) {
        if (map.hasLayer(rawMarkersLayer)) map.removeLayer(rawMarkersLayer);
        if (map.hasLayer(clusterLayer)) map.removeLayer(clusterLayer);
      } else {
        if (useClusters) {
          if (!map.hasLayer(clusterLayer)) clusterLayer.addTo(map);
          if (map.hasLayer(rawMarkersLayer)) map.removeLayer(rawMarkersLayer);
        } else {
          if (!map.hasLayer(rawMarkersLayer)) rawMarkersLayer.addTo(map);
          if (map.hasLayer(clusterLayer)) map.removeLayer(clusterLayer);
        }
      }

      // Heatmap independent
      if (!showHeat) {
        if (heatLayer && map.hasLayer(heatLayer)) map.removeLayer(heatLayer);
      } else {
        if (heatLayer && !map.hasLayer(heatLayer)) heatLayer.addTo(map);
      }
    }

    async function renderIncidents(){
      await ensureCountriesData();

      rawMarkersLayer.clearLayers();
      clusterLayer.clearLayers();

      const typeValue = document.getElementById("typeFilter").value;
      const q = norm(document.getElementById("searchFilter").value);
      const { from, to } = getSelectedDateRange();

      const filtered = INCIDENTS.filter(x => {
        const d = toDateKey(x.date);
        const dateOk = inDateRangeKey(d, from, to);
        const typeOk = (typeValue === "ALL") ? true : (x.type === typeValue);
        const textOk = !q ? true : (norm(x.title).includes(q));
        return dateOk && typeOk && textOk;
      });

      LAST_FILTERED_INCIDENTS = filtered;

      const heatPoints = [];
      let renderedCount = 0;

      for (const x of filtered){
        const pos = resolveIncidentLatLon(x);
        if (!pos) continue;

        const marker = L.marker([pos.lat, pos.lon], { icon: iconForType(x.type) });
        marker.bindPopup(buildIncidentPopupHtml(x, pos.usedFallback));

        rawMarkersLayer.addLayer(marker);
        clusterLayer.addLayer(marker);

        heatPoints.push([pos.lat, pos.lon, heatWeight(x)]);
        renderedCount += 1;
      }

      // Rebuild heat layer
      if (heatLayer && map.hasLayer(heatLayer)) map.removeLayer(heatLayer);
      heatLayer = L.heatLayer(heatPoints, {
        radius: 22,
        blur: 18,
        maxZoom: 9
      });

      document.getElementById("countBadge").textContent = `${renderedCount} incidens`;

      // Apply current visibility preferences
      setIncidentLayersVisibility();
    }

    // ---------------------------
    // 6) Index layer + legend (NCSI only)
    // ---------------------------
    function indexColor(v){
      if (v == null) return "rgba(255,255,255,.05)";
      if (v >= 80) return "rgba(110,231,255,.35)";
      if (v >= 70) return "rgba(167,139,250,.28)";
      if (v >= 60) return "rgba(110,231,255,.18)";
      return "rgba(255,255,255,.10)";
    }

    let indexLayer = null;

    async function rebuildIndexLayer(){
      if (indexLayer && map.hasLayer(indexLayer)) map.removeLayer(indexLayer);
      indexLayer = null;

      const idx = currentIndexObj();
      if (!idx) return;

      if (selectedIndexKey === "EUCSI_2024") {
        hideLegend();
        return;
      }

      const { countriesGeo } = await ensureCountriesData();
      const scores = idx.scores ?? {};

      indexLayer = L.geoJSON(countriesGeo, {
        style: (feature) => {
          const iso2 = feature?.properties?.iso_a2;
          const v = scores?.[iso2];
          return {
            color: "rgba(110,231,255,.18)",
            weight: 1,
            fillColor: indexColor(v),
            fillOpacity: 1
          };
        }
      });

      if (document.getElementById("toggleIndex").checked) {
        indexLayer.addTo(map);
        showLegend();
      }
    }

    const legend = L.control({ position: "bottomright" });
    legend.onAdd = function(){
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = `
        <div class="head">Országos index</div>
        <div class="item"><span class="swatch" style="background:${indexColor(80)}"></span> 80–100</div>
        <div class="item"><span class="swatch" style="background:${indexColor(70)}"></span> 70–79</div>
        <div class="item"><span class="swatch" style="background:${indexColor(60)}"></span> 60–69</div>
        <div class="item"><span class="swatch" style="background:${indexColor(10)}"></span> 0–59</div>
        <div class="item"><span class="swatch" style="background:${indexColor(null)}"></span> n/a</div>
      `;
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    function showLegend(){ try { legend.addTo(map); } catch(e){} }
    function hideLegend(){ try { map.removeControl(legend); } catch(e){} }

    // ---------------------------
    // 7) Borders overlay
    // ---------------------------
    let bordersLayer = null;
    async function ensureBordersLayer(){
      if (bordersLayer) return bordersLayer;
      const { countriesGeo } = await ensureCountriesData();
      bordersLayer = L.geoJSON(countriesGeo, {
        style: () => ({
          color: "rgba(110,231,255,.28)",
          weight: 2,
          opacity: 1,
          fillOpacity: 0
        }),
        interactive: false
      });
      return bordersLayer;
    }

    // ---------------------------
    // 8) Country click layer: index + incident counts (same as before)
    // ---------------------------
    let countryClickLayer = null;
    let lastSelectedFeatureLayer = null;

    function getIncidentStatsForCountry(iso2){
      const list = (LAST_FILTERED_INCIDENTS || []).filter(x => x.country === iso2);
      const top = list
        .slice()
        .sort((a,b) => (toDateKey(b.date)).localeCompare(toDateKey(a.date)))
        .slice(0, 5);
      return { count: list.length, top };
    }

    function getIndexValueForCountry(iso2){
      const idx = currentIndexObj();
      if (!idx) return null;
      if (selectedIndexKey !== "NCSI") return null;
      return (idx.scores && typeof idx.scores[iso2] === "number") ? idx.scores[iso2] : null;
    }

    function euCsiSummaryHtml(){
      const idx = currentIndexObj();
      const val = idx?.eu_metrics?.overall_index_value;
      if (val == null) return `<div class="pop-meta">EU-CSI: n/a</div>`;
      return `
        <div class="pop-meta" style="margin-top:8px;">
          EU-CSI 2024 (EU-szint): <strong>${val}</strong> / 100<br/>
          Megjegyzés: EU-szintű publikáció; nem országonkénti pontlista.
        </div>
      `;
    }

    async function ensureCountryClickLayer(){
      if (countryClickLayer) return countryClickLayer;

      const { countriesGeo } = await ensureCountriesData();

      countryClickLayer = L.geoJSON(countriesGeo, {
        style: () => ({ color: "rgba(255,255,255,0)", weight: 0, fillOpacity: 0 }),
        onEachFeature: (feature, layer) => {
          layer.on("click", (e) => {
            const iso2 = feature?.properties?.iso_a2;
            const name = feature?.properties?.name || "Ismeretlen";
            if (!iso2) return;

            if (lastSelectedFeatureLayer) {
              lastSelectedFeatureLayer.setStyle({ color: "rgba(255,255,255,0)", weight: 0, fillOpacity: 0 });
            }
            layer.setStyle({ color: "rgba(110,231,255,.55)", weight: 2, fillOpacity: 0 });
            lastSelectedFeatureLayer = layer;

            const stats = getIncidentStatsForCountry(iso2);
            const idxVal = getIndexValueForCountry(iso2);

            const idxBlock = (selectedIndexKey === "NCSI")
              ? `<div class="pop-meta" style="margin-top:8px;">NCSI: <strong>${idxVal ?? "n/a"}</strong> / 100</div>`
              : `<div class="pop-meta" style="margin-top:8px;">Index: <strong>ENISA EU-CSI 2024 (EU-szint)</strong></div>`;

            const listHtml = stats.top.length
              ? `<ol class="pop-meta" style="margin:8px 0 0 0; padding-left:18px;">
                   ${stats.top.map(x => `<li>${x.title ?? "Incidens"} <span style="color:rgba(235,245,255,.65)">(${toDateKey(x.date)})</span></li>`).join("")}
                 </ol>`
              : `<div class="pop-meta" style="margin-top:8px;">Nincs incidens a jelenlegi szűrők szerint.</div>`;

            const eucsiHtml = (selectedIndexKey === "EUCSI_2024") ? euCsiSummaryHtml() : "";

            L.popup({ maxWidth: 420 })
              .setLatLng(e.latlng)
              .setContent(`
                <div class="pop-title">${name} (${iso2})</div>
                <div class="pop-meta">Aktuális szűrők szerinti incidensek: <strong>${stats.count}</strong></div>
                ${idxBlock}
                ${eucsiHtml}
                <div class="pop-meta" style="margin-top:10px;">Top események (max 5):</div>
                ${listHtml}
              `)
              .openOn(map);
          });
        }
      }).addTo(map);

      return countryClickLayer;
    }

    // ---------------------------
    // 9) UI wiring
    // ---------------------------
    document.getElementById("fromRange").addEventListener("input", async () => { syncDateLabels(); await renderIncidents(); });
    document.getElementById("toRange").addEventListener("input", async () => { syncDateLabels(); await renderIncidents(); });

    document.getElementById("applyBtn").addEventListener("click", async () => { syncDateLabels(); await renderIncidents(); });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      document.getElementById("typeFilter").value = "ALL";
      document.getElementById("searchFilter").value = "";
      document.getElementById("toggleIncidents").checked = true;
      document.getElementById("toggleClusters").checked = true;
      document.getElementById("toggleHeatmap").checked = false;

      document.getElementById("fromRange").value = 0;
      document.getElementById("toRange").value = ALL_DATES.length - 1;
      syncDateLabels();

      await renderIncidents();
    });

    // auto-filter while typing
    let typingTimer = null;
    document.getElementById("searchFilter").addEventListener("input", () => {
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => renderIncidents(), 140);
    });
    document.getElementById("typeFilter").addEventListener("change", () => renderIncidents());

    // toggles for incident layers
    document.getElementById("toggleIncidents").addEventListener("change", () => setIncidentLayersVisibility());
    document.getElementById("toggleClusters").addEventListener("change", () => setIncidentLayersVisibility());
    document.getElementById("toggleHeatmap").addEventListener("change", () => setIncidentLayersVisibility());

    // index toggle
    document.getElementById("toggleIndex").addEventListener("change", async (e) => {
      if (e.target.checked) {
        if (indexLayer) indexLayer.addTo(map);
        if (selectedIndexKey === "NCSI") showLegend();
      } else {
        if (indexLayer) map.removeLayer(indexLayer);
        hideLegend();
      }
    });

    document.getElementById("toggleBorders").addEventListener("change", async (e) => {
      const layer = await ensureBordersLayer();
      if (e.target.checked) layer.addTo(map);
      else map.removeLayer(layer);
    });

    document.getElementById("indexSelect").addEventListener("change", async (e) => {
      selectedIndexKey = e.target.value;
      updateIndexSourceLine();
      await rebuildIndexLayer();
    });

    // ---------------------------
    // 10) Boot
    // ---------------------------
    (async () => {
      try {
        await ensureCountriesData();
        await ensureCountryClickLayer();

        await loadIncidents();
        await loadIndices();

        buildDateAxis();
        syncDateLabels();

        // initial layers
        rawMarkersLayer.addTo(map); // will be swapped to cluster based on toggle
        setIncidentLayersVisibility();

        await renderIncidents();
        await rebuildIndexLayer();
      } catch (err) {
        console.error(err);
        document.getElementById("countBadge").textContent = "Hiba: adatok nem töltődtek be";
        document.getElementById("indexSourceLine").textContent = "Index forrás: hiba a betöltéskor";
      }
    })();
  </script>
</body>
</html>
